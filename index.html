<style>
:root {
  --black: #080604;
  --white: #faf8f4;
  --gold: #c8920a;
  --gold-light: #e8b030;
  --gold-pale: #fdf3d9;
  --charcoal: #1c1a16;
  --warm-gray: #6b6355;
  --border: #d4c9b0;
  --red: #9a1b1b;
  --green: #2d6a2d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--white);
  color: var(--black);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ANNOUNCE */
.announce {
  background: var(--gold);
  color: var(--black);
  text-align: center;
  padding: 0.55rem 1rem;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* NAV */
nav {
  background: var(--black);
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-brand img {
  height: 36px;
  width: auto;
  border-radius: 0;
}
.nav-brand-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  font-weight: 700;
  font-style: italic;
  color: var(--white);
}
.nav-brand-text span { color: var(--gold-light); }


.nav-cta {
  background: var(--gold);
  color: var(--black);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.5rem 1.25rem;
  text-decoration: none;
  transition: background 0.2s;
}
.nav-cta:hover { background: var(--gold-light); }

/* HERO */
.hero {
  background: var(--black);
  color: var(--white);
  padding: 6rem 2rem 5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 110%, rgba(200,146,10,0.18), transparent),
    repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(255,255,255,0.012) 80px, rgba(255,255,255,0.012) 81px),
    repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.012) 80px, rgba(255,255,255,0.012) 81px);
  pointer-events: none;
}

.hero-eyebrow {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold-light);
  margin-bottom: 1.5rem;
  position: relative;
  animation: fadeUp 0.6s ease 0.1s both;
}
.hero-eyebrow::before, .hero-eyebrow::after { content: ' - '; opacity: 0.4; }

.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 9vw, 7rem);
  font-weight: 700;
  line-height: 0.95;
  letter-spacing: -0.02em;
  margin-bottom: 0.75rem;
  position: relative;
  animation: fadeUp 0.6s ease 0.25s both;
}
.hero h1 em { display: block; font-style: italic; color: var(--gold-light); }

.hero-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.15rem, 3vw, 1.6rem);
  font-style: italic;
  color: #9a8870;
  margin: 1.25rem auto 0;
  max-width: 600px;
  line-height: 1.5;
  position: relative;
  animation: fadeUp 0.6s ease 0.4s both;
}

.hero-hook {
  max-width: 680px;
  margin: 2.5rem auto 0;
  position: relative;
  text-align: left;
  animation: fadeUp 0.6s ease 0.55s both;
}

.hook-rule {
  width: 48px;
  height: 2px;
  background: var(--gold);
  margin: 0 auto 2rem;
}

.hero-hook p {
  font-size: 1.08rem;
  line-height: 1.8;
  color: #b8afa0;
  margin-bottom: 1rem;
  text-align: center;
}
.hero-hook p strong { color: var(--white); font-weight: 600; }

.pain-checks {
  list-style: none;
  margin: 1.5rem auto;
  max-width: 460px;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}
.pain-checks li {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-size: 0.95rem;
  color: #c8bfaf;
  padding: 0.5rem 0.75rem;
  border-left: 2px solid #2a2520;
}
.pain-checks li::before {
  content: '✗';
  color: #7a2020;
  font-weight: 700;
  flex-shrink: 0;
}

.hero-pivot {
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.4rem, 3.5vw, 2rem);
  font-style: italic;
  color: var(--gold-light);
  margin: 2rem auto;
  max-width: 600px;
  line-height: 1.4;
}

.hero-cta-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
  margin-top: 2.5rem;
  position: relative;
  animation: fadeUp 0.6s ease 0.7s both;
}

.btn-primary {
  display: inline-block;
  background: var(--gold);
  color: var(--black);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 1.1rem 2.75rem;
  text-decoration: none;
  transition: all 0.2s;
}
.btn-primary:hover {
  background: var(--gold-light);
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(200,146,10,0.35);
}

.btn-ghost {
  display: inline-block;
  border: 1px solid #3a3020;
  color: #7a6a52;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.6rem 1.5rem;
  text-decoration: none;
  transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold-light); }

.hero-reassure {
  font-size: 0.72rem;
  color: #3a3020;
  letter-spacing: 0.05em;
}

/* PROOF STRIP */
.proof-strip {
  background: var(--charcoal);
  border-top: 1px solid #252018;
  border-bottom: 1px solid #252018;
  padding: 1.5rem 2rem;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 3rem;
  flex-wrap: wrap;
}
.proof-item { text-align: center; }
.proof-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  color: var(--gold-light);
  line-height: 1;
}
.proof-label {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #5a4a32;
  margin-top: 0.2rem;
}
.proof-pipe { width: 1px; height: 36px; background: #2a2520; }

/* SECTION TAG */
.section-tag {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.75rem;
  display: block;
}

/* BRIDGE */
.bridge {
  background: var(--black);
  color: var(--white);
  padding: 5rem 2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.bridge::before {
  content: '"';
  position: absolute;
  font-family: 'Cormorant Garamond', serif;
  font-size: 22rem;
  color: rgba(200,146,10,0.04);
  top: -3rem;
  left: 50%;
  transform: translateX(-50%);
  line-height: 1;
  pointer-events: none;
}
.bridge blockquote {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.7rem, 4.5vw, 3rem);
  font-style: italic;
  line-height: 1.35;
  max-width: 800px;
  margin: 0 auto 1.5rem;
  position: relative;
}
.bridge blockquote strong { font-style: normal; font-weight: 700; color: var(--gold-light); }
.bridge cite {
  font-size: 0.75rem;
  font-style: normal;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #5a4a32;
}

/* PRODUCTS */
.products-section {
  max-width: 1100px;
  margin: 0 auto;
  padding: 5rem 2rem;
  text-align: center;
}
.products-section h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 700;
  margin-bottom: 0.5rem;
}
.products-section > p {
  font-size: 1rem;
  color: var(--warm-gray);
  max-width: 480px;
  margin: 0 auto 3rem;
  line-height: 1.7;
}
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 1.25rem;
  text-align: left;
}
.product-card {
  border: 1px solid var(--border);
  background: white;
  padding: 1.75rem 1.5rem;
  position: relative;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
}
.product-card:hover {
  border-color: var(--gold);
  box-shadow: 0 8px 32px rgba(0,0,0,0.07);
  transform: translateY(-3px);
}
.product-card.featured {
  border: 2px solid var(--gold);
  background: var(--black);
  color: var(--white);
}
.featured-tag {
  position: absolute;
  top: -11px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--gold);
  color: var(--black);
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.22rem 0.7rem;
  white-space: nowrap;
}
.prod-format {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.5rem;
}
.product-card.featured .prod-format { color: var(--gold-light); }
.prod-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.6rem;
}
.prod-desc {
  font-size: 0.83rem;
  line-height: 1.6;
  color: var(--warm-gray);
  margin-bottom: 0.9rem;
  flex: 1;
}
.product-card.featured .prod-desc { color: #8a7a62; }
.prod-includes {
  list-style: none;
  margin-bottom: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.prod-includes li {
  font-size: 0.78rem;
  color: #3a3020;
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  line-height: 1.4;
}
.product-card.featured .prod-includes li { color: #c0b8a8; }
.prod-includes li::before {
  content: '✓';
  color: var(--green);
  font-weight: 700;
  font-size: 0.72rem;
  flex-shrink: 0;
  margin-top: 0.1rem;
}
.product-card.featured .prod-includes li::before { color: var(--gold-light); }
.prod-price {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.6rem;
  color: var(--black);
  line-height: 1;
  margin-bottom: 0.15rem;
}
.product-card.featured .prod-price { color: var(--gold-light); }
.prod-price-note {
  font-size: 0.7rem;
  color: var(--warm-gray);
  margin-bottom: 1rem;
  letter-spacing: 0.05em;
}
.product-card.featured .prod-price-note { color: #5a4a32; }
.btn-card {
  display: block;
  text-align: center;
  background: var(--black);
  color: var(--white);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.8rem;
  text-decoration: none;
  transition: all 0.2s;
  margin-top: auto;
}
.btn-card:hover { background: var(--charcoal); }
.product-card.featured .btn-card { background: var(--gold); color: var(--black); }
.product-card.featured .btn-card:hover { background: var(--gold-light); }

/* TESTIMONIALS */
.testimonials { background: #f2ece0; padding: 5rem 2rem; }
.testi-inner { max-width: 1000px; margin: 0 auto; }
.testi-inner h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.8rem, 4vw, 2.5rem);
  font-weight: 700;
  text-align: center;
  margin-bottom: 2.5rem;
}
.testi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.25rem; }
.testi-card { background: white; border-left: 3px solid var(--gold); padding: 1.5rem; }
.testi-stars { color: var(--gold); font-size: 0.8rem; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
.testi-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.05rem;
  line-height: 1.65;
  color: var(--black);
  margin-bottom: 0.9rem;
}
.testi-author {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--warm-gray);
}

/* COMMUNITY */
.community { background: var(--black); color: var(--white); padding: 5rem 2rem; }
.community-inner { max-width: 1050px; margin: 0 auto; }
.community-header { text-align: center; margin-bottom: 3rem; }
.community-header h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 700;
  margin-bottom: 0.75rem;
}
.community-header h2 em { font-style: italic; color: var(--gold-light); }
.community-header p { font-size: 1rem; color: #7a6a52; max-width: 500px; margin: 0 auto; line-height: 1.7; }
.comm-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.25rem; }
.comm-card {
  border: 1px solid #252018;
  padding: 1.75rem;
  transition: border-color 0.2s;
  display: flex;
  flex-direction: column;
}
.comm-card:hover { border-color: var(--gold); }
.comm-card.highlight { border-color: var(--gold); background: rgba(200,146,10,0.04); }
.comm-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
.comm-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 700; margin-bottom: 0.5rem; }
.comm-card .comm-desc { font-size: 0.84rem; color: #6a5a42; line-height: 1.65; margin-bottom: 1.25rem; flex: 1; }
.comm-price { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--gold-light); line-height: 1; }
.comm-period { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: #4a3a22; margin-bottom: 0.5rem; }
.comm-savings { display: inline-block; background: var(--gold); color: var(--black); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.2rem 0.6rem; margin-bottom: 1.25rem; }
.btn-comm {
  display: block;
  text-align: center;
  border: 1px solid #3a2e1a;
  color: #9a8870;
  font-size: 0.73rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.8rem;
  text-decoration: none;
  transition: all 0.2s;
  margin-top: auto;
}
.btn-comm:hover { border-color: var(--gold); color: var(--gold-light); }
.comm-card.highlight .btn-comm { background: var(--gold); color: var(--black); border-color: var(--gold); }
.comm-card.highlight .btn-comm:hover { background: var(--gold-light); }

/* GUARANTEE */
.guarantee { background: var(--charcoal); color: var(--white); padding: 4rem 2rem; text-align: center; }
.guarantee-inner { max-width: 580px; margin: 0 auto; }
.guarantee-shield { font-size: 3.5rem; margin-bottom: 1rem; }
.guarantee h3 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; margin-bottom: 0.75rem; }
.guarantee p { font-size: 1rem; color: #8a7a62; line-height: 1.75; margin-bottom: 1.5rem; }
.guarantee p strong { color: var(--white); font-weight: 600; }

/* FINAL CTA */
.final-cta {
  background: var(--black);
  color: var(--white);
  padding: 5rem 2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.final-cta::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(200,146,10,0.1), transparent);
  pointer-events: none;
}
.final-cta h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 700;
  font-style: italic;
  margin-bottom: 1rem;
  position: relative;
}
.final-cta h2 span { color: var(--gold-light); }
.final-cta p {
  font-size: 1.05rem;
  color: #7a6a52;
  max-width: 480px;
  margin: 0 auto 2.5rem;
  line-height: 1.75;
  position: relative;
}
.final-cta .btn-primary { position: relative; font-size: 1.05rem; padding: 1.2rem 3rem; }

/* FOOTER */
footer {
  background: #050402;
  color: #3a3020;
  padding: 2rem;
  text-align: center;
  border-top: 1px solid #1a1810;
}
footer p { font-size: 0.75rem; line-height: 1.8; letter-spacing: 0.05em; }
footer a { color: #5a4a32; text-decoration: none; }
footer a:hover { color: var(--gold); }

/* ANIMATION */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* EXIT-INTENT POPUP STYLES */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,4,2,0.88);
  z-index: 9998;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  backdrop-filter: blur(5px);
}
.overlay.active {
  display: flex;
  animation: fadeOverlay 0.25s ease forwards;
}
@keyframes fadeOverlay {
  from { opacity: 0; }
  to { opacity: 1; }
}

.popup {
  background: var(--white);
  max-width: 560px;
  width: 100%;
  position: relative;
  animation: slidePopup 0.32s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  overflow: hidden;
  max-height: 92vh;
  overflow-y: auto;
}
@keyframes slidePopup {
  from { transform: translateY(50px) scale(0.95); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

.popup-close {
  position: absolute;
  top: 0.85rem;
  right: 1rem;
  background: none;
  border: none;
  color: #4a3a22;
  font-size: 1.4rem;
  cursor: pointer;
  line-height: 1;
  z-index: 10;
  transition: color 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.popup-close:hover { color: var(--gold-light); }

.popup-top {
  background: var(--black);
  color: var(--white);
  padding: 2.5rem 2.5rem 2rem;
  text-align: center;
  position: relative;
}
.popup-top::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}
.popup-eyebrow {
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gold-light);
  margin-bottom: 0.75rem;
}
.popup-top h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 0.6rem;
}
.popup-top h2 em { font-style: italic; color: var(--gold-light); }
.popup-top p { font-size: 0.88rem; color: #7a6a52; line-height: 1.6; }

.popup-body { padding: 2rem 2.5rem 2.5rem; }

.popup-offer {
  display: flex;
  align-items: center;
  gap: 1rem;
  background: var(--gold-pale);
  border: 1px solid var(--gold);
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
}
.popup-offer-icon { font-size: 2rem; flex-shrink: 0; }
